*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent: #c9c9ff;
  --accent-faint: rgba(201,201,255,0.07);
  --accent-border: rgba(201,201,255,0.12);
  --btn-bg: rgba(201,201,255,0.14);
  --btn-bg-hover: rgba(201,201,255,0.22);
  --btn-border: rgba(201,201,255,0.12);
  --btn-border-hover: rgba(201,201,255,0.28);
  --text: #e8e8ff;
  --text-dim: rgba(201,201,255,0.55);
  --separator: rgba(201,201,255,0.12);
  --progress-bg: rgba(201,201,255,0.18);
  --progress-fill: #c9c9ff;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #07090f;
  font-family: 'Onest', 'Satoshi', sans-serif;
  color: var(--text);
}

#bgv {
  position: fixed; inset: 0; width: 100%; height: 100%;
  object-fit: cover; z-index: 0;
  filter: brightness(0.6) saturate(1.15);
}
#ov {
  position: fixed; inset: 0; z-index: 1;
  background:
    radial-gradient(ellipse 60% 55% at 50% 50%, transparent 0%, rgba(4,6,18,0.72) 100%),
    linear-gradient(to bottom, rgba(4,6,18,0.25) 0%, transparent 30%, transparent 70%, rgba(4,6,18,0.4) 100%);
  pointer-events: none;
}

/* ── SPLASH ── */
#splash {
  position: fixed; inset: 0; z-index: 100;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
  background: rgba(4,6,18,0.97);
  cursor: pointer;
  transition: opacity 0.7s ease;
}
#splash.fade-out { opacity: 0; pointer-events: none; }

.splash-title {
  font-family: 'Satoshi', sans-serif;
  font-size: clamp(20px, 5vw, 30px);
  font-weight: 700; color: #fff; letter-spacing: -0.3px;
  display: flex; align-items: center; gap: 14px;
}
.splash-line {
  display: inline-block; width: 1.5px; height: 26px;
  background: rgba(201,201,255,0.4); border-radius: 2px;
}
.splash-sub {
  font-size: 12px; color: rgba(201,201,255,0.45); letter-spacing: .06em;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:0.45} 50%{opacity:0.9} }

/* ── PAGE ── */
#page {
  position: relative; z-index: 2;
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
  opacity: 0; transition: opacity 0.6s ease 0.1s;
}
#page.visible { opacity: 1; }

/* ── CARD ── */
.card {
  width: min(460px, 100%);
  display: flex; flex-direction: column; align-items: center;
}

/* ── AVATAR ── */
.avatar-wrap {
  position: relative; width: 90px; height: 90px; margin-bottom: 10px;
}
.av-img {
  width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
  display: block; border: 2px solid rgba(255,255,255,0.15);
  box-shadow: 0 0 0 4px rgba(201,201,255,0.07);
}
.av-overlay {
  position: absolute;
  inset: -18px;
  width: calc(100% + 36px); height: calc(100% + 36px);
  pointer-events: none; z-index: 2; object-fit: contain;
}
.av-orbit {
  position: absolute; inset: -5px; border-radius: 50%;
  border: 1.5px solid rgba(201,201,255,0.22);
  animation: orbit 10s linear infinite; pointer-events: none; z-index: 1;
}
.av-orbit::after {
  content: ''; position: absolute; top: 0; left: 50%;
  width: 5px; height: 5px; background: var(--accent);
  border-radius: 50%; transform: translate(-50%,-50%);
  box-shadow: 0 0 8px 2px rgba(201,201,255,0.55);
}
@keyframes orbit { to { transform: rotate(360deg); } }

/* ── NAME ── */
.username-row {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  margin-bottom: 2px;
}
.username {
  font-family: 'Satoshi', sans-serif;
  font-size: 32px; font-weight: 700; letter-spacing: -0.5px; color: #fff;
  text-shadow: 0 0 20px rgba(201,201,255,0.35);
}
.badge { position: relative; display: inline-flex; align-items: center; cursor: default; }
.badge img {
  width: 22px; height: 22px; object-fit: contain;
  filter: drop-shadow(0 0 6px rgba(201,201,255,0.5));
  transition: transform .2s;
}
.badge:hover img { transform: scale(1.18); }
.badge-tip {
  position: absolute; bottom: calc(100% + 8px); left: 50%;
  transform: translateX(-50%);
  background: rgba(10,12,28,0.95); border: 1px solid rgba(201,201,255,0.18);
  color: var(--accent); font-size: 11px; font-weight: 600; letter-spacing: .06em;
  padding: 4px 11px; border-radius: 8px; white-space: nowrap;
  opacity: 0; pointer-events: none; transition: opacity .15s; backdrop-filter: blur(10px);
}
.badge-tip::after {
  content: ''; position: absolute; top: 100%; left: 50%;
  transform: translateX(-50%); border: 5px solid transparent;
  border-top-color: rgba(201,201,255,0.18);
}
.badge:hover .badge-tip { opacity: 1; }

.joined { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }

/* ── TYPEWRITER ── */
.typewriter-wrap {
  font-size: 13px; color: var(--text-dim); min-height: 20px;
  margin-bottom: 10px; text-align: center;
}
.tw-cursor {
  display: inline-block; width: 2px; height: 13px;
  background: var(--accent); margin-left: 2px; vertical-align: middle;
  animation: blink 1s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── META ROW ── */
.meta-row {
  display: flex; align-items: center; gap: 16px;
  font-size: 12px; color: var(--text-dim);
  margin-bottom: 14px; flex-wrap: wrap; justify-content: center;
}
.meta-item { display: flex; align-items: center; gap: 5px; }
.meta-item svg { width: 13px; height: 13px; fill: currentColor; opacity: 0.7; flex-shrink: 0; }

/* ── SEP ── */
.sep {
  width: 100%; height: 1px;
  background: linear-gradient(90deg, transparent, var(--separator) 30%, var(--separator) 70%, transparent);
  margin: 4px 0;
}

/* ── SECTION ── */
.section { width: 100%; display: flex; flex-direction: column; gap: 10px; padding: 12px 0; }
.btn-row { display: flex; gap: 8px; width: 100%; justify-content: center; flex-wrap: wrap; }

.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 18px; background: var(--btn-bg);
  border: 1.5px solid var(--btn-border); border-radius: 12px;
  color: var(--text); font-family: inherit; font-size: 13px; font-weight: 600;
  letter-spacing: .02em; text-decoration: none; cursor: pointer;
  transition: background .18s, border-color .18s, transform .14s, box-shadow .18s;
  position: relative; overflow: hidden; white-space: nowrap;
}
.btn::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.06), transparent);
  opacity: 0; transition: opacity .18s; border-radius: inherit;
}
.btn:hover::after { opacity: 1; }
.btn:hover {
  background: var(--btn-bg-hover); border-color: var(--btn-border-hover);
  transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,0.3);
}
.btn:active { transform: translateY(0); }
.btn img { width: 18px; height: 18px; object-fit: contain; flex-shrink: 0; }

/* ── PLAYER ── */
.player {
  width: 100%; background: var(--accent-faint);
  border: 1.5px solid var(--accent-border); border-radius: 16px;
  padding: 12px 14px; display: flex; flex-direction: column; gap: 10px;
}
.player-top { display: flex; align-items: center; gap: 11px; }
.player-icon {
  width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
  background: rgba(201,201,255,0.12);
  display: flex; align-items: center; justify-content: center;
}
.player-icon svg { width: 18px; height: 18px; fill: var(--accent); }

}
.ctrl:hover { color: var(--accent); transform: scale(1.15); }

.progress-row { display: flex; align-items: center; gap: 8px; }
.ts { font-size: 10px; color: var(--text-dim); font-variant-numeric: tabular-nums; min-width: 28px; flex-shrink: 0; }

.progress-track { flex: 1; height: 3px; background: var(--progress-bg); border-radius: 99px; cursor: pointer; overflow: hidden; }
.progress-fill { height: 100%; background: var(--progress-fill); border-radius: 99px; width: 0%; transition: width .4s linear; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 26px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: rgba(8,10,24,0.94); border: 1.5px solid rgba(201,201,255,0.18);

  padding: 8px 20px; border-radius: 12px; font-size: 12px; font-weight: 600;
  opacity: 0; pointer-events: none; transition: opacity .22s, transform .22s;
  z-index: 99; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<script>
const aud = document.getElementById('aud');
const cpp = document.getElementById('cpp');
const ppic = document.getElementById('ppic');
const pfill = document.getElementById('pfill');
const cur = document.getElementById('cur');
const dur = document.getElementById('dur');
const ptrack = document.getElementById('ptrack');
const toast = document.getElementById('toast');
const splash = document.getElementById('splash');
const page = document.getElementById('page');

aud.load();

const PLAY  = '<path d="M8 5v14l11-7z"/>';
const PAUSE = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
let playing = false;
let launched = false;

function fmt(s) {
  const m = Math.floor(s / 60), ss = Math.floor(s % 60);
  return m + ':' + ss.toString().padStart(2, '0');
}

function launch() {
  if (launched) return;
  launched = true;
  aud.play().catch(() => {});
  ppic.innerHTML = PAUSE;
  playing = true;
  splash.classList.add('fade-out');
  setTimeout(function() {
    splash.style.display = 'none';
    page.classList.add('visible');
    startTypewriter();
  }, 700);
}

document.addEventListener('click', launch, { once: true });
document.addEventListener('keydown', launch, { once: true });

// Typewriter
var lines = [
  'Founder of party.',
  'party.sellhub.cx got the cheapest goods.',
  'check my socials below.'
];
var twIdx = 0, twChar = 0, twDeleting = false;
var twEl = document.getElementById('tw-text');

function startTypewriter() { twTick(); }

function twTick() {
  var line = lines[twIdx];
  if (!twDeleting) {
    twChar++;
    twEl.textContent = line.slice(0, twChar);
    if (twChar === line.length) {
      setTimeout(function() { twDeleting = true; twTick(); }, 2200);
      return;
    }
    setTimeout(twTick, 50);
  } else {
    twChar--;
    twEl.textContent = line.slice(0, twChar);
    if (twChar === 0) {
      twDeleting = false;
      twIdx = (twIdx + 1) % lines.length;
      setTimeout(twTick, 400);
      return;
    }
    setTimeout(twTick, 28);
  }
}

aud.addEventListener('timeupdate', function() {
  if (!aud.duration) return;
  pfill.style.width = (aud.currentTime / aud.duration * 100) + '%';
  cur.textContent = fmt(aud.currentTime);
  document.getElementById('ptime').textContent = fmt(aud.currentTime);
});
aud.addEventListener('loadedmetadata', function() {
  dur.textContent = fmt(aud.duration);
});

function toggle() {
  if (playing) { aud.pause(); ppic.innerHTML = PLAY; playing = false; }
  else { aud.play().catch(function(){}); ppic.innerHTML = PAUSE; playing = true; }
}

cpp.addEventListener('click', toggle);
document.getElementById('cbk').addEventListener('click', function() { aud.currentTime = Math.max(0, aud.currentTime - 10); });
document.getElementById('cfw').addEventListener('click', function() { aud.currentTime = Math.min(aud.duration || 0, aud.currentTime + 10); });
ptrack.addEventListener('click', function(e) {
  var r = ptrack.getBoundingClientRect();
  aud.currentTime = ((e.clientX - r.left) / r.width) * (aud.duration || 0);
});

var tid;
function copyAddr(addr, label) {
  navigator.clipboard.writeText(addr).then(function() {
    toast.textContent = label + ' address copied';
    toast.classList.add('show');
    clearTimeout(tid);
    tid = setTimeout(function() { toast.classList.remove('show'); }, 2100);
  });
}
</script>
